name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Frameworks/flutter-local

      - uses: actions/checkout@v4
        with:
          repository: One-does-simply/Specification
          path: Specification

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: Frameworks/flutter-local
        run: flutter pub get

      - name: Analyze
        working-directory: Frameworks/flutter-local
        run: flutter analyze --fatal-errors --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        working-directory: Frameworks/flutter-local
        run: flutter test

name: ods_flutter_local
description: ODS Flutter Local — A reference framework for the One Does Simply specification.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.3.10
  http: ^1.2.2
  archive: ^4.0.4
  url_launcher: ^6.3.1
  fl_chart: ^1.2.0
  # markdown is loaded from a local copy (packages/) because pub.dev was
  # unreachable on the corporate network at time of development. To switch
  # to pub.dev, replace with: markdown: ^7.3.0
  markdown:
    path: packages

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/themes/

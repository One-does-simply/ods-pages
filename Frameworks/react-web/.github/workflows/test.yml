name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Frameworks/react-web

      - uses: actions/checkout@v4
        with:
          repository: One-does-simply/Specification
          path: Specification

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frameworks/react-web/package-lock.json

      - name: Install dependencies
        working-directory: Frameworks/react-web
        run: npm ci

      - name: TypeScript check
        working-directory: Frameworks/react-web
        run: npx tsc -b

      - name: Run tests
        working-directory: Frameworks/react-web
        run: npm test

  e2e:
    name: E2E Tests (Playwright + PocketBase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Frameworks/react-web

      - uses: actions/checkout@v4
        with:
          repository: One-does-simply/Specification
          path: Specification

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frameworks/react-web/package-lock.json

      - name: Install dependencies
        working-directory: Frameworks/react-web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Frameworks/react-web
        run: npx playwright install --with-deps chromium

      # PocketBase binary + server are managed entirely by the test's
      # globalSetup (tests/e2e/global-setup.ts). No extra CI steps needed.
      - name: Run E2E tests
        working-directory: Frameworks/react-web
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frameworks/react-web/playwright-report/
          retention-days: 14

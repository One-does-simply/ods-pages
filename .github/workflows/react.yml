name: React

on:
  push:
    branches: [main]
    paths:
      - 'Frameworks/react-web/**'
      - 'Frameworks/conformance/**'
      - 'Specification/**'
      - '.github/workflows/react.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frameworks/react-web/**'
      - 'Frameworks/conformance/**'
      - 'Specification/**'
      - '.github/workflows/react.yml'

jobs:
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frameworks/react-web/package-lock.json

      - name: Install dependencies
        working-directory: Frameworks/react-web
        run: npm ci

      - name: TypeScript check
        working-directory: Frameworks/react-web
        run: npx tsc -b

      - name: Run tests with coverage thresholds
        working-directory: Frameworks/react-web
        # `test:coverage` runs vitest with --coverage; vitest enforces the
        # per-folder thresholds in vitest.config.ts and exits non-zero if
        # coverage drops below baseline (currently models 90%, parser 90%,
        # engine 50%). Bump these in lockstep with new tests landing.
        run: npm run test:coverage

  e2e:
    name: E2E Tests (Playwright + PocketBase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frameworks/react-web/package-lock.json

      - name: Install dependencies
        working-directory: Frameworks/react-web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Frameworks/react-web
        run: npx playwright install --with-deps chromium

      # PocketBase binary + server are managed by tests/e2e/global-setup.ts.
      - name: Run E2E tests
        working-directory: Frameworks/react-web
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frameworks/react-web/playwright-report/
          retention-days: 14

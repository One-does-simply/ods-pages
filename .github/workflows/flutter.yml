name: Flutter

on:
  push:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Frameworks/flutter-local
        run: flutter pub get

      - name: Analyze
        working-directory: Frameworks/flutter-local
        # errors are always fatal; we choose not to fail on warnings/infos.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Mirrors publish.sh: non-widget tests only, excluding `slow`-tagged
      # Batch 9 perf tests (dart_test.yaml). Widget tests are skipped in
      # CI for the same reason they're skipped locally — the flutter_tools
      # harness hangs on this project's widget suite. Revisit when the
      # widget-test unskip item in TODO.md lands.
      - name: Run tests
        working-directory: Frameworks/flutter-local
        run: flutter test test/engine test/models test/parser test/integration test/conformance --exclude-tags=slow

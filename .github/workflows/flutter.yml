name: Flutter

on:
  push:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Frameworks/conformance/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Frameworks/conformance/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Frameworks/flutter-local
        run: flutter pub get

      - name: Analyze
        working-directory: Frameworks/flutter-local
        # errors are always fatal; we choose not to fail on warnings/infos.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Mirrors publish.sh. Widget tests are included now that the
      # FakeAsync-vs-sqflite_ffi hang is fixed (see
      # test/widget/_test_harness.dart). `slow`-tagged Batch 9 perf
      # tests still excluded — their Windows I/O timing budgets flake.
      - name: Run tests with coverage
        working-directory: Frameworks/flutter-local
        run: flutter test test/engine test/models test/parser test/integration test/conformance test/widget --exclude-tags=slow --coverage

      # Per-directory line-coverage thresholds (lib/engine, lib/models,
      # lib/parser). Mirrors React's vitest threshold gate. Tool definition
      # lives in tool/coverage_check.dart. Bump thresholds in lockstep
      # with new tests landing — they should only ratchet up.
      - name: Enforce coverage thresholds
        working-directory: Frameworks/flutter-local
        run: dart run tool/coverage_check.dart

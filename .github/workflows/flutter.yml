name: Flutter

on:
  push:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frameworks/flutter-local/**'
      - 'Specification/**'
      - '.github/workflows/flutter.yml'

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Frameworks/flutter-local
        run: flutter pub get

      - name: Analyze
        working-directory: Frameworks/flutter-local
        # errors are always fatal; we choose not to fail on warnings/infos.
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Batch 9 perf tests are tagged `slow` (see dart_test.yaml) — excluded
      # from the gate because their I/O timing budgets flake on cold runners.
      # Widget tests are skipped on Windows only; on Linux they run normally.
      - name: Run tests
        working-directory: Frameworks/flutter-local
        run: flutter test --exclude-tags=slow
